services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_projek_bi
    user: "1000:1000" # Memastikan permission file konsisten
    ports:
      - "8123:8123" # Port HTTP (Python & Power BI)
      - "9000:9000" # Port Native (Clickhouse Client)
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=password123
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # Format relatif
      - ch_data:/var/lib/clickhouse
    restart: always
volumes:
  ch_data: